spring.application.name=youtube-monetization

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=postgres
spring.datasource.password=KosPrav1979
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# MinIO
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket.uploaded=uploaded_videos
minio.bucket.published=published_videos

# File upload limits (110MB to allow for multipart overhead)
spring.servlet.multipart.max-file-size=110MB
spring.servlet.multipart.max-request-size=110MB

server.port=8080
