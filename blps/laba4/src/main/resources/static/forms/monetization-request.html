<form name="monetizationRequestForm" role="form">
  <div class="alert alert-success">
    <strong>Eligible!</strong> You have a published video. You can set up monetization.
  </div>

  <div class="form-group">
    <label for="strategy">Monetization Strategy <span class="text-danger">*</span></label>
    <select id="strategy"
            class="form-control"
            cam-variable-name="strategy"
            cam-variable-type="String"
            required>
      <option value="">-- Select Strategy --</option>
      <option value="AD_BASED">Ad-Based Monetization</option>
      <option value="SUBSCRIPTION_BASED">Subscription-Based Monetization</option>
      <option value="HYBRID">Hybrid (Ads + Subscriptions)</option>
    </select>
  </div>

  <div class="form-group">
    <label for="configuration">Strategy Configuration</label>
    <textarea id="configuration"
              class="form-control"
              cam-variable-name="configuration"
              cam-variable-type="String"
              rows="4"
              placeholder="Describe your monetization configuration..."></textarea>
  </div>
</form>
