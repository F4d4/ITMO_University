<form name="monetizationMethodForm" role="form">
  <div class="form-group">
    <label for="methodType">Monetization Type <span class="text-danger">*</span></label>
    <select id="methodType"
            class="form-control"
            cam-variable-name="methodType"
            cam-variable-type="String"
            required>
      <option value="">-- Select Type --</option>
      <option value="AD">Advertisement</option>
      <option value="SUBSCRIPTION">Subscription</option>
    </select>
  </div>

  <div class="form-group">
    <label for="adType">Ad Type (for AD only)</label>
    <select id="adType"
            class="form-control"
            cam-variable-name="adType"
            cam-variable-type="String">
      <option value="">-- Select Ad Type --</option>
      <option value="PRE_ROLL">Pre-Roll</option>
      <option value="MID_ROLL">Mid-Roll</option>
      <option value="POST_ROLL">Post-Roll</option>
    </select>
  </div>

  <div class="form-group">
    <label for="adName">Advertisement Name (for AD only)</label>
    <input type="text"
           id="adName"
           class="form-control"
           cam-variable-name="adName"
           cam-variable-type="String"
           placeholder="Enter advertisement name"/>
    <small class="text-muted">Will be automatically checked for forbidden content.</small>
  </div>

  <div class="form-group">
    <label for="subscriptionPrice">Subscription Price (for SUBSCRIPTION only)</label>
    <input type="number"
           id="subscriptionPrice"
           class="form-control"
           cam-variable-name="subscriptionPrice"
           cam-variable-type="Double"
           min="0"
           step="0.01"
           placeholder="0.00"/>
  </div>

  <div class="form-group">
    <label for="tags">Tags (optional)</label>
    <input type="text"
           id="tags"
           class="form-control"
           cam-variable-name="methodTags"
           cam-variable-type="String"
           placeholder="Enter tags separated by comma"/>
  </div>
</form>
