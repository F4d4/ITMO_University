<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Пользователь</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .field { margin-bottom: 10px; }
    label { font-weight: bold; display: block; }
    .value { padding: 6px; background: #f9f9f9; border: 1px solid #eee; border-radius: 4px; }
  </style>
</head>
<body>
  <h3>Информация о пользователе</h3>
  <div id="userDetail">
    <p>Загрузка...</p>
  </div>

  <script>
    var dataRaw = document.querySelector('[cam-variable-name="userJson"]');
    if (dataRaw && dataRaw.value) {
      try {
        var u = JSON.parse(dataRaw.value);
        var html = '';
        html += '<div class="field"><label>ID</label><div class="value">' + u.id + '</div></div>';
        html += '<div class="field"><label>Имя пользователя</label><div class="value">' + u.username + '</div></div>';
        html += '<div class="field"><label>Email</label><div class="value">' + u.email + '</div></div>';
        html += '<div class="field"><label>Роль</label><div class="value">' + u.role + '</div></div>';
        html += '<div class="field"><label>Дата регистрации</label><div class="value">' + (u.createdAt || '') + '</div></div>';
        document.getElementById('userDetail').innerHTML = html;
      } catch(e) {}
    }
  </script>
  <input type="hidden" cam-variable-name="userJson" cam-variable-type="String"/>
</body>
</html>
