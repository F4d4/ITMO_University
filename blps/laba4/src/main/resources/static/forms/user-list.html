<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Список пользователей</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .form-group { margin-top: 15px; }
    label { font-weight: bold; }
    select { padding: 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h3>Список пользователей</h3>
  <div id="userTable">
    <p>Загрузка...</p>
  </div>

  <div class="form-group">
    <label>Действие:</label><br/>
    <select cam-variable-name="refresh" cam-variable-type="Boolean">
      <option value="false">Закрыть</option>
      <option value="true">Обновить список</option>
    </select>
  </div>

  <script>
    var dataRaw = document.querySelector('[cam-variable-name="userListJson"]');
    if (dataRaw && dataRaw.value) {
      try {
        var users = JSON.parse(dataRaw.value);
        var html = '<table><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th></tr>';
        users.forEach(function(u) {
          html += '<tr><td>' + u.id + '</td><td>' + u.username + '</td><td>' + u.email + '</td><td>' + u.role + '</td></tr>';
        });
        html += '</table><p>Всего: ' + users.length + '</p>';
        document.getElementById('userTable').innerHTML = html;
      } catch(e) {}
    }
  </script>
  <input type="hidden" cam-variable-name="userListJson" cam-variable-type="String"/>
</body>
</html>
