<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Просмотр видео</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .field { margin-bottom: 10px; }
    label { font-weight: bold; display: block; }
    .value { padding: 6px; background: #f9f9f9; border: 1px solid #eee; border-radius: 4px; }
  </style>
</head>
<body>
  <h3>Информация о видео</h3>
  <div id="videoDetail">
    <p>Загрузка...</p>
  </div>

  <script>
    var dataRaw = document.querySelector('[cam-variable-name="videoJson"]');
    if (dataRaw && dataRaw.value) {
      try {
        var v = JSON.parse(dataRaw.value);
        var html = '';
        html += '<div class="field"><label>ID</label><div class="value">' + v.id + '</div></div>';
        html += '<div class="field"><label>Название</label><div class="value">' + (v.title || '-') + '</div></div>';
        html += '<div class="field"><label>Описание</label><div class="value">' + (v.description || '-') + '</div></div>';
        html += '<div class="field"><label>Статус</label><div class="value">' + v.status + '</div></div>';
        html += '<div class="field"><label>Тип аудитории</label><div class="value">' + (v.audienceType || '-') + '</div></div>';
        html += '<div class="field"><label>Доступ</label><div class="value">' + (v.accessType || '-') + '</div></div>';
        html += '<div class="field"><label>Создано</label><div class="value">' + (v.createdAt || '') + '</div></div>';
        document.getElementById('videoDetail').innerHTML = html;
      } catch(e) {}
    }
  </script>
  <input type="hidden" cam-variable-name="videoJson" cam-variable-type="String"/>
</body>
</html>
